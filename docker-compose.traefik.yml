services:
  traefik:
    image: traefik:v3.0
    container_name: mcpist-traefik
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mcpist

  console:
    build:
      context: ./apps/console
      dockerfile: Dockerfile.dev
    container_name: mcpist-console
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.console.rule=Host(`console.localhost`)"
      - "traefik.http.routers.console.entrypoints=web"
      - "traefik.http.services.console.loadbalancer.server.port=3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_APP_URL=http://console.localhost
      - NEXT_PUBLIC_MCP_SERVER_URL=http://mcp.localhost
      - NEXT_PUBLIC_SUPABASE_URL=http://host.docker.internal:54321
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - MCP_SERVER_URL=http://mcp.localhost
      - CONSOLE_URL=http://console.localhost
    volumes:
      - ./apps/console:/app
      - /app/node_modules
      - /app/.next
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # Worker (Cloudflare Workers エミュレーション)
  # =============================================================================
  # 通常開発: server を参照
  # infra 開発: server-primary, server-secondary を参照
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile.dev
    container_name: mcpist-worker
    profiles: ["default"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp.rule=Host(`mcp.localhost`)"
      - "traefik.http.routers.mcp.entrypoints=web"
      - "traefik.http.services.mcp.loadbalancer.server.port=8787"
    environment:
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - RENDER_URL=http://server:8089
      - KOYEB_URL=http://server:8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_JWKS_URL=http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # infra 開発用 Worker（マルチサーバー構成）
  worker-infra:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile.dev
    container_name: mcpist-worker-infra
    profiles: ["infra"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp-infra.rule=Host(`mcp.localhost`)"
      - "traefik.http.routers.mcp-infra.entrypoints=web"
      - "traefik.http.services.mcp-infra.loadbalancer.server.port=8787"
    environment:
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - RENDER_URL=http://server-primary:8089
      - KOYEB_URL=http://server-secondary:8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_JWKS_URL=http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # API Server (通常開発用 - シングルサーバー)
  # =============================================================================
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.dev
    container_name: mcpist-server
    profiles: ["default"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=Host(`api.localhost`)"
      - "traefik.http.routers.server.entrypoints=web"
      - "traefik.http.services.server.loadbalancer.server.port=8089"
    environment:
      - PORT=8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CONSOLE_URL=http://console.localhost
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - VAULT_URL=http://console:3000/api
      - INSTANCE_ID=local-docker
      - INSTANCE_REGION=local
    volumes:
      - ./apps/server:/app
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # API Server (infra 開発用 - マルチサーバー)
  # =============================================================================
  # Primary (Render 相当)
  # api.localhost/primary/* → server-primary
  server-primary:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.dev
    container_name: mcpist-server-primary
    profiles: ["infra"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server-primary.rule=Host(`api.localhost`) && PathPrefix(`/primary`)"
      - "traefik.http.routers.server-primary.entrypoints=web"
      - "traefik.http.routers.server-primary.middlewares=strip-primary"
      - "traefik.http.middlewares.strip-primary.stripprefix.prefixes=/primary"
      - "traefik.http.services.server-primary.loadbalancer.server.port=8089"
    environment:
      - PORT=8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CONSOLE_URL=http://console.localhost
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - VAULT_URL=http://console:3000/api
      - INSTANCE_ID=local-primary
      - INSTANCE_REGION=render
    volumes:
      - ./apps/server:/app
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Secondary (Koyeb 相当)
  # api.localhost/secondary/* → server-secondary
  server-secondary:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.dev
    container_name: mcpist-server-secondary
    profiles: ["infra"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server-secondary.rule=Host(`api.localhost`) && PathPrefix(`/secondary`)"
      - "traefik.http.routers.server-secondary.entrypoints=web"
      - "traefik.http.routers.server-secondary.middlewares=strip-secondary"
      - "traefik.http.middlewares.strip-secondary.stripprefix.prefixes=/secondary"
      - "traefik.http.services.server-secondary.loadbalancer.server.port=8089"
    environment:
      - PORT=8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CONSOLE_URL=http://console.localhost
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - VAULT_URL=http://console:3000/api
      - INSTANCE_ID=local-secondary
      - INSTANCE_REGION=koyeb
    volumes:
      - ./apps/server:/app
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  mcpist:
    driver: bridge
