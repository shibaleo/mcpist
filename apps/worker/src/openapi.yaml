openapi: "3.1.0"
info:
  title: MCPist API
  version: "1.0.0"
  description: >-
    MCPist API — connect AI assistants to external tools
    via the Model Context Protocol (MCP).

servers:
  - url: https://mcp.mcpist.app
    description: Production
  - url: https://mcp.dev.mcpist.app
    description: Development

paths:
  # ── System ───────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [system]
      responses:
        "200":
          description: Service is healthy

  /openapi.json:
    get:
      operationId: getOpenApiSpec
      summary: OpenAPI specification
      tags: [system]
      responses:
        "200":
          description: OpenAPI 3.1 JSON document

  # ── OAuth Discovery ──────────────────────────────────────────
  /.well-known/oauth-protected-resource:
    get:
      operationId: getOAuthProtectedResource
      summary: OAuth Protected Resource Metadata (RFC 9728)
      tags: [oauth-discovery]
      responses:
        "200":
          description: Protected resource metadata JSON

  /.well-known/oauth-authorization-server:
    get:
      operationId: getOAuthAuthorizationServer
      summary: OAuth Authorization Server Metadata (RFC 8414)
      tags: [oauth-discovery]
      responses:
        "200":
          description: Authorization server metadata JSON

  /v1/mcp/.well-known/oauth-protected-resource:
    get:
      operationId: getV1McpOAuthProtectedResource
      summary: MCP-scoped OAuth Protected Resource Metadata
      tags: [oauth-discovery]
      responses:
        "200":
          description: Protected resource metadata JSON

  /v1/mcp/.well-known/oauth-authorization-server:
    get:
      operationId: getV1McpOAuthAuthorizationServer
      summary: MCP-scoped OAuth Authorization Server Metadata
      tags: [oauth-discovery]
      responses:
        "200":
          description: Authorization server metadata JSON

  # ── MCP Transport ──────────────────────────────────────────
  /v1/mcp/{path}:
    post:
      operationId: mcpTransport
      summary: MCP transport endpoint (Streamable HTTP)
      description: >-
        Accepts MCP protocol messages (JSON-RPC 2.0) and returns responses.
        Supports initialize, tools/list, tools/call, prompts/list, prompts/get,
        and other standard MCP methods.
      tags: [mcp]
      security:
        - bearerAuth: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: MCP transport sub-path
      responses:
        "200":
          description: MCP JSON-RPC response
        "401":
          description: Unauthorized
        "503":
          description: Service unavailable

  # ── Modules (public) ─────────────────────────────────────────
  /v1/modules:
    get:
      operationId: listModules
      summary: List available modules with their tools
      tags: [modules]
      responses:
        "200":
          description: Module list with tool definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleWithTools"

  # ── Me (authenticated user) ─────────────────────────────────
  /v1/me/profile:
    get:
      operationId: getMyProfile
      summary: Get current user profile
      tags: [me]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /v1/me/settings:
    put:
      operationId: updateSettings
      summary: Update user settings
      tags: [me]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "401":
          description: Unauthorized

  /v1/me/onboarding:
    post:
      operationId: completeUserOnboarding
      summary: Complete a user onboarding step
      tags: [me]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOnboardingBody"
      responses:
        "200":
          description: Onboarding step completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResult"
        "401":
          description: Unauthorized

  /v1/me/usage:
    get:
      operationId: getUsage
      summary: Get usage statistics
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Start date (ISO 8601)
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
          description: End date (ISO 8601)
      responses:
        "200":
          description: Usage data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageData"
        "401":
          description: Unauthorized

  /v1/me/stripe:
    get:
      operationId: getStripeCustomerId
      summary: Get linked Stripe customer ID
      tags: [me]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stripe customer info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeCustomer"
        "401":
          description: Unauthorized
    put:
      operationId: linkStripeCustomer
      summary: Link a Stripe customer ID
      tags: [me]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkStripeCustomerBody"
      responses:
        "200":
          description: Stripe customer linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "401":
          description: Unauthorized

  /v1/me/credentials:
    get:
      operationId: listCredentials
      summary: List stored credentials
      tags: [me]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Credential list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credential"
        "401":
          description: Unauthorized

  /v1/me/credentials/{module}:
    put:
      operationId: upsertCredential
      summary: Create or update credentials for a module
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: module
          in: path
          required: true
          schema:
            type: string
          description: Module identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertCredentialBody"
      responses:
        "200":
          description: Credential saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpsertCredentialResult"
        "401":
          description: Unauthorized
    delete:
      operationId: deleteCredential
      summary: Delete credentials for a module
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: module
          in: path
          required: true
          schema:
            type: string
          description: Module identifier
      responses:
        "200":
          description: Credential deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "401":
          description: Unauthorized

  /v1/me/apikeys:
    get:
      operationId: listApiKeys
      summary: List API keys
      tags: [me]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
        "401":
          description: Unauthorized
    post:
      operationId: generateApiKey
      summary: Generate a new API key
      tags: [me]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateApiKeyBody"
      responses:
        "200":
          description: Generated API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateApiKeyResult"
        "401":
          description: Unauthorized

  /v1/me/apikeys/{id}:
    delete:
      operationId: revokeApiKey
      summary: Revoke an API key
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: API key ID
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "401":
          description: Unauthorized

  /v1/me/prompts:
    get:
      operationId: listPrompts
      summary: List prompts
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: module
          in: query
          schema:
            type: string
          description: Filter by module name
      responses:
        "200":
          description: Prompt list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prompt"
        "401":
          description: Unauthorized
    post:
      operationId: createPrompt
      summary: Create a prompt
      tags: [me]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromptBody"
      responses:
        "200":
          description: Prompt created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpsertPromptResult"
        "401":
          description: Unauthorized

  /v1/me/prompts/{id}:
    get:
      operationId: getPrompt
      summary: Get a prompt by ID
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Prompt ID
      responses:
        "200":
          description: Prompt detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPromptResult"
        "401":
          description: Unauthorized
    put:
      operationId: updatePrompt
      summary: Update a prompt
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Prompt ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromptBody"
      responses:
        "200":
          description: Prompt updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpsertPromptResult"
        "401":
          description: Unauthorized
    delete:
      operationId: deletePrompt
      summary: Delete a prompt
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Prompt ID
      responses:
        "200":
          description: Prompt deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePromptResult"
        "401":
          description: Unauthorized

  /v1/me/modules/config:
    get:
      operationId: getModuleConfig
      summary: Get module configuration
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: module
          in: query
          schema:
            type: string
          description: Filter by module name
      responses:
        "200":
          description: Module configuration
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleConfig"
        "401":
          description: Unauthorized

  /v1/me/modules/{name}/tools:
    put:
      operationId: upsertToolSettings
      summary: Update tool enable/disable settings for a module
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Module name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertToolSettingsBody"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpsertToolSettingsResult"
        "401":
          description: Unauthorized

  /v1/me/modules/{name}/description:
    put:
      operationId: upsertModuleDescription
      summary: Update module description
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Module name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertModuleDescriptionBody"
      responses:
        "200":
          description: Description updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "401":
          description: Unauthorized

  /v1/me/oauth/consents:
    get:
      operationId: listOAuthConsents
      summary: List OAuth consents
      tags: [me]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OAuth consent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OAuthConsent"
        "401":
          description: Unauthorized

  /v1/me/oauth/consents/{id}:
    delete:
      operationId: revokeOAuthConsent
      summary: Revoke an OAuth consent
      tags: [me]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Consent ID
      responses:
        "200":
          description: Consent revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeConsentResult"
        "401":
          description: Unauthorized

  # ── OAuth App Credentials (public, for OAuth flow) ──────────
  /v1/oauth/apps/{provider}/credentials:
    get:
      operationId: getOAuthAppCredentials
      summary: Get OAuth app credentials for a provider
      tags: [oauth]
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: OAuth provider identifier (e.g. github, google)
      responses:
        "200":
          description: OAuth app credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthAppCredentials"

  # ── Admin ──────────────────────────────────────────────────
  /v1/admin/oauth/apps:
    get:
      operationId: listOAuthApps
      summary: List all OAuth apps (admin only)
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OAuth app list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OAuthApp"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin role required

  /v1/admin/oauth/apps/{provider}:
    put:
      operationId: upsertOAuthApp
      summary: Create or update an OAuth app (admin only)
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: OAuth provider identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertOAuthAppBody"
      responses:
        "200":
          description: OAuth app saved
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin role required
    delete:
      operationId: deleteOAuthApp
      summary: Delete an OAuth app (admin only)
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: OAuth provider identifier
      responses:
        "200":
          description: OAuth app deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin role required

  /v1/admin/oauth/consents:
    get:
      operationId: listAllOAuthConsents
      summary: List all OAuth consents across users (admin only)
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All OAuth consents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OAuthConsentAdmin"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin role required

  # ── Stripe ────────────────────────────────────────────────────
  /v1/stripe/webhook:
    post:
      operationId: handleStripeWebhook
      summary: Handle Stripe webhook events
      description: >-
        Receives Stripe webhook events (invoice.paid, customer.subscription.deleted).
        Authenticated via Stripe signature verification, not JWT.
      tags: [stripe]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
        "400":
          description: Invalid signature or payload

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Clerk JWT or MCPist API key (mpt_xxx)

  schemas:
    # ── Modules ──
    ModuleWithTools:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        descriptions:
          type: object
          additionalProperties:
            type: string
        tools:
          type: array
          items:
            type: object
            additionalProperties: true

    ModuleConfig:
      type: object
      required: [module_name, tool_id, enabled]
      properties:
        module_name:
          type: string
        description:
          type: string
          nullable: true
        tool_id:
          type: string
        enabled:
          type: boolean

    UpsertToolSettingsBody:
      type: object
      required: [enabled_tools, disabled_tools]
      properties:
        enabled_tools:
          type: array
          items:
            type: string
        disabled_tools:
          type: array
          items:
            type: string

    UpsertToolSettingsResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        enabled_count:
          type: integer
        disabled_count:
          type: integer

    UpsertModuleDescriptionBody:
      type: object
      required: [description]
      properties:
        description:
          type: string

    # ── API Keys ──
    ApiKey:
      type: object
      required: [id, key_prefix, display_name]
      properties:
        id:
          type: string
          format: uuid
        key_prefix:
          type: string
        display_name:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true

    GenerateApiKeyBody:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
        expires_at:
          type: string
          format: date-time
          description: Expiration timestamp (optional)

    GenerateApiKeyResult:
      type: object
      required: [api_key, key_prefix]
      properties:
        api_key:
          type: string
          description: Full API key (only returned at creation time)
        key_prefix:
          type: string

    # ── Prompts ──
    Prompt:
      type: object
      required: [id, name, content, enabled, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        module_name:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        content:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GetPromptResult:
      type: object
      required: [found]
      properties:
        found:
          type: boolean
        id:
          type: string
          format: uuid
        module_name:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        content:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        error:
          type: string

    CreatePromptBody:
      type: object
      required: [name, content, enabled]
      properties:
        name:
          type: string
        content:
          type: string
        module_name:
          type: string
        enabled:
          type: boolean
        description:
          type: string

    UpdatePromptBody:
      type: object
      required: [name, content, enabled]
      properties:
        name:
          type: string
        content:
          type: string
        module_name:
          type: string
        enabled:
          type: boolean
        description:
          type: string

    UpsertPromptResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        id:
          type: string
          format: uuid
        action:
          type: string
        error:
          type: string

    DeletePromptResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        error:
          type: string

    # ── Credentials ──
    Credential:
      type: object
      required: [module, created_at, updated_at]
      properties:
        module:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpsertCredentialBody:
      type: object
      required: [credentials]
      properties:
        credentials:
          type: object
          additionalProperties: true
          description: Credential data (access_token, refresh_token, etc.)

    UpsertCredentialResult:
      type: object
      required: [success, module]
      properties:
        success:
          type: boolean
        module:
          type: string

    SuccessResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ── User ──
    UserProfile:
      type: object
      required: [user_id, email, account_status, plan_id, daily_used, daily_limit, role, connected_count]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        account_status:
          type: string
        plan_id:
          type: string
        daily_used:
          type: integer
        daily_limit:
          type: integer
        role:
          type: string
        settings:
          type: object
          additionalProperties: true
          nullable: true
        display_name:
          type: string
          nullable: true
        connected_count:
          type: integer

    UsageData:
      type: object
      required: [total_used, by_module, period]
      properties:
        total_used:
          type: integer
        by_module:
          type: object
          additionalProperties:
            type: integer
        period:
          type: object
          required: [start, end]
          properties:
            start:
              type: string
            end:
              type: string

    StripeCustomer:
      type: object
      properties:
        stripe_customer_id:
          type: string
          nullable: true

    LinkStripeCustomerBody:
      type: object
      required: [stripe_customer_id]
      properties:
        stripe_customer_id:
          type: string

    UpdateSettingsBody:
      type: object
      required: [settings]
      properties:
        settings:
          type: object
          additionalProperties: true
          description: User settings object

    CompleteOnboardingBody:
      type: object
      required: [event_id]
      properties:
        event_id:
          type: string

    OnboardingResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        already_completed:
          type: boolean
        plan_id:
