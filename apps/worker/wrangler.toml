name = "mcpist-gateway"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# Cron trigger for health checks (every minute)
[triggers]
crons = ["* * * * *"]

# KV Namespaces
# ローカル開発時はpreview_idを使用
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "debf8e54ac4c45fdb501c769146daf07"
preview_id = "dev-rate-limit"

[[kv_namespaces]]
binding = "HEALTH_STATE"
id = "7af68d0ea663473d8a49ad1a3356716b"
preview_id = "dev-health-state"

[[kv_namespaces]]
binding = "API_KEY_CACHE"
id = "04a54e251d5b47f9bcc5d7a7143edbe7"
preview_id = "dev-api-key-cache"

# 環境変数
# ローカル開発: .dev.vars から読み込み（pnpm env:sync で生成）
# Docker: docker-compose の environment から注入
# 本番: wrangler secret で設定

# Rate Limit設定（デフォルト値）
[vars]
RATE_LIMIT_GLOBAL_MAX = "1000"      # IP単位: req/min
RATE_LIMIT_BURST_MAX = "5"          # ユーザー単位: req/sec

# 本番環境
[env.production]
vars = { PRIMARY_API_URL = "https://mcpist-api-dev.onrender.com", SECONDARY_API_URL = "https://ill-lauren-mcpist-ddf14e71.koyeb.app", SUPABASE_URL = "https://xstfrjvgpqxvyuochtss.supabase.co", SUPABASE_JWKS_URL = "https://xstfrjvgpqxvyuochtss.supabase.co/auth/v1/.well-known/jwks.json", RATE_LIMIT_GLOBAL_MAX = "1000", RATE_LIMIT_BURST_MAX = "5" }

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "debf8e54ac4c45fdb501c769146daf07"

[[env.production.kv_namespaces]]
binding = "HEALTH_STATE"
id = "7af68d0ea663473d8a49ad1a3356716b"

[[env.production.kv_namespaces]]
binding = "API_KEY_CACHE"
id = "04a54e251d5b47f9bcc5d7a7143edbe7"

# シークレット（wrangler secret で設定）
# - GATEWAY_SECRET: オリジン直接アクセス防止用
# - SUPABASE_PUBLISHABLE_KEY: API Key検証用
