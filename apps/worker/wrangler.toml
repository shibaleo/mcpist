name = "mcpist-gateway"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# Cron trigger for health checks (every minute)
[triggers]
crons = ["* * * * *"]

# KV Namespaces
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "xxx"  # 本番用ID（後で設定）
preview_id = "xxx"  # プレビュー用ID（後で設定）

[[kv_namespaces]]
binding = "HEALTH_STATE"
id = "xxx"  # 本番用ID（後で設定）
preview_id = "xxx"  # プレビュー用ID（後で設定）

# 環境変数（デフォルト = ローカル開発）
[vars]
# バックエンド設定
RENDER_URL = "http://localhost:8089"
KOYEB_URL = "http://localhost:8089"

# Supabase設定
SUPABASE_URL = "http://127.0.0.1:54321"
SUPABASE_JWKS_URL = "http://127.0.0.1:54321/auth/v1/.well-known/jwks.json"

# Rate Limit設定
RATE_LIMIT_GLOBAL_MAX = "1000"      # IP単位: req/min
RATE_LIMIT_BURST_MAX = "5"          # ユーザー単位: req/sec

# 開発環境（Devcontainer内）
[env.dev]
vars = { RENDER_URL = "http://localhost:8081", KOYEB_URL = "http://localhost:8082", SUPABASE_URL = "http://127.0.0.1:54321" }

# 本番環境
[env.production]
vars = { RENDER_URL = "REDACTED_URL", KOYEB_URL = "REDACTED_URL", SUPABASE_URL = "https://xxx.supabase.co", SUPABASE_JWKS_URL = "https://xxx.supabase.co/auth/v1/.well-known/jwks.json" }

# シークレット（wrangler secret で設定）
# - GATEWAY_SECRET: オリジン直接アクセス防止用
# - SUPABASE_SERVICE_ROLE_KEY: API Key検証用
