openapi: "3.0.3"
info:
  title: MCPist Server API
  version: "1.0.0"
  description: >-
    Internal REST API for the MCPist Go Server.
    Authenticated via X-Gateway-Token (Ed25519 JWT signed by Worker).

paths:
  # ── Modules (public) ─────────────────────────────────────────
  /v1/modules:
    get:
      operationId: listModules
      summary: List available modules with their tools
      tags: [modules]
      responses:
        "200":
          description: Module list with tool definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleWithTools"

  # ── Registration (gateway-only, user may not exist yet) ──────
  /v1/me/register:
    post:
      operationId: registerUser
      summary: Register or find existing user from Clerk ID
      tags: [me]
      security:
        - gatewayToken: []
      responses:
        "200":
          description: User registered or already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResult"
        "400":
          description: Missing clerk_id or email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Profile ──────────────────────────────────────────────────
  /v1/me/profile:
    get:
      operationId: getMyProfile
      summary: Get current user profile
      tags: [me]
      security:
        - gatewayToken: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /v1/me/settings:
    put:
      operationId: updateSettings
      summary: Update user settings
      tags: [me]
      security:
        - gatewayToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /v1/me/onboarding:
    post:
      operationId: completeUserOnboarding
      summary: Complete a user onboarding step
      tags: [me]
      security:
        - gatewayToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOnboardingBody"
      responses:
        "200":
          description: Onboarding step completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  # ── Usage ────────────────────────────────────────────────────
  /v1/me/usage:
    get:
      operationId: getUsage
      summary: Get usage statistics
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD)
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD)
      responses:
        "200":
          description: Usage data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageData"

  # ── Stripe ───────────────────────────────────────────────────
  /v1/me/stripe:
    get:
      operationId: getStripeCustomerId
      summary: Get linked Stripe customer ID
      tags: [me]
      security:
        - gatewayToken: []
      responses:
        "200":
          description: Stripe customer info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeCustomer"
    put:
      operationId: linkStripeCustomer
      summary: Link a Stripe customer ID
      tags: [me]
      security:
        - gatewayToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkStripeCustomerBody"
      responses:
        "200":
          description: Stripe customer linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  # ── Credentials ──────────────────────────────────────────────
  /v1/me/credentials:
    get:
      operationId: listCredentials
      summary: List stored credentials
      tags: [me]
      security:
        - gatewayToken: []
      responses:
        "200":
          description: Credential list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credential"

  /v1/me/credentials/{module}:
    put:
      operationId: upsertCredential
      summary: Create or update credentials for a module
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: module
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertCredentialBody"
      responses:
        "200":
          description: Credential saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
    delete:
      operationId: deleteCredential
      summary: Delete credentials for a module
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: module
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  # ── API Keys ─────────────────────────────────────────────────
  /v1/me/apikeys:
    get:
      operationId: listApiKeys
      summary: List API keys
      tags: [me]
      security:
        - gatewayToken: []
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      operationId: generateApiKey
      summary: Generate a new API key
      tags: [me]
      security:
        - gatewayToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateApiKeyBody"
      responses:
        "201":
          description: Generated API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateApiKeyResult"

  /v1/me/apikeys/{id}:
    delete:
      operationId: revokeApiKey
      summary: Revoke an API key
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  # ── Prompts ──────────────────────────────────────────────────
  /v1/me/prompts:
    get:
      operationId: listPrompts
      summary: List prompts
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: module
          in: query
          schema:
            type: string
          description: Filter by module name
      responses:
        "200":
          description: Prompt list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prompt"
    post:
      operationId: createPrompt
      summary: Create a prompt
      tags: [me]
      security:
        - gatewayToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromptBody"
      responses:
        "201":
          description: Prompt created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"

  /v1/me/prompts/{id}:
    get:
      operationId: getPrompt
      summary: Get a prompt by ID
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prompt detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"
    put:
      operationId: updatePrompt
      summary: Update a prompt
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromptBody"
      responses:
        "200":
          description: Prompt updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
    delete:
      operationId: deletePrompt
      summary: Delete a prompt
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prompt deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  # ── Module Config ────────────────────────────────────────────
  /v1/me/modules/config:
    get:
      operationId: getModuleConfig
      summary: Get module configuration
      tags: [me]
      security:
        - gatewayToken: []
      responses:
        "200":
          description: Module configuration
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleConfig"

  /v1/me/modules/{name}/tools:
    put:
      operationId: upsertToolSettings
      summary: Update tool enable/disable settings for a module
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertToolSettingsBody"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /v1/me/modules/{name}/description:
    put:
      operationId: upsertModuleDescription
      summary: Update module description
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertModuleDescriptionBody"
      responses:
        "200":
          description: Description updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  # ── OAuth Consents ───────────────────────────────────────────
  /v1/me/oauth/consents:
    get:
      operationId: listOAuthConsents
      summary: List OAuth consents
      tags: [me]
      security:
        - gatewayToken: []
      responses:
        "200":
          description: OAuth consent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OAuthConsent"

  /v1/me/oauth/consents/{id}:
    delete:
      operationId: revokeOAuthConsent
      summary: Revoke an OAuth consent
      tags: [me]
      security:
        - gatewayToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Consent revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  # ── OAuth App Credentials ────────────────────────────────────
  /v1/oauth/apps/{provider}/credentials:
    get:
      operationId: getOAuthAppCredentials
      summary: Get OAuth app credentials for a provider
      tags: [oauth]
      security:
        - gatewayToken: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OAuth app credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthAppCredentials"

  # ── Admin ────────────────────────────────────────────────────
  /v1/admin/oauth/apps:
    get:
      operationId: listOAuthApps
      summary: List all OAuth apps (admin only)
      tags: [admin]
      security:
        - gatewayToken: []
      responses:
        "200":
          description: OAuth app list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OAuthApp"

  /v1/admin/oauth/apps/{provider}:
    put:
      operationId: upsertOAuthApp
      summary: Create or update an OAuth app (admin only)
      tags: [admin]
      security:
        - gatewayToken: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertOAuthAppBody"
      responses:
        "200":
          description: OAuth app saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
    delete:
      operationId: deleteOAuthApp
      summary: Delete an OAuth app (admin only)
      tags: [admin]
      security:
        - gatewayToken: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OAuth app deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /v1/admin/oauth/consents:
    get:
      operationId: listAllOAuthConsents
      summary: List all OAuth consents across users (admin only)
      tags: [admin]
      security:
        - gatewayToken: []
      responses:
        "200":
          description: All OAuth consents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OAuthConsentAdmin"

components:
  securitySchemes:
    gatewayToken:
      type: apiKey
      in: header
      name: X-Gateway-Token
      description: Ed25519 JWT signed by Worker gateway

  schemas:
    # ── Common ──
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ── Modules ──
    ModuleWithTools:
      type: object
      required: [id, name, status, tools]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        tools: {}
        created_at:
          type: string
          format: date-time

    ModuleConfig:
      type: object
      required: [module_name, enabled, description]
      properties:
        module_name:
          type: string
        enabled:
          type: boolean
        description:
          type: string
        enabled_tools:
          type: array
          items:
            type: string
          nullable: true

    UpsertToolSettingsBody:
      type: object
      required: [enabled, disabled]
      properties:
        enabled:
          type: array
          items:
            type: string
        disabled:
          type: array
          items:
            type: string

    UpsertModuleDescriptionBody:
      type: object
      required: [description]
      properties:
        description:
          type: string

    # ── Registration ──
    RegisterResult:
      type: object
      required: [id]
      properties:
        id:
          type: string

    # ── User ──
    UserProfile:
      type: object
      required: [id, account_status, plan_id, role, connected_count]
      properties:
        id:
          type: string
        account_status:
          type: string
        plan_id:
          type: string
        display_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        role:
          type: string
        settings: {}
        connected_count:
          type: integer

    UsageData:
      type: object
      required: [total_used, by_module, period]
      properties:
        total_used:
          type: integer
        by_module:
          type: object
          additionalProperties:
            type: integer
        period:
          $ref: "#/components/schemas/UsagePeriod"

    UsagePeriod:
      type: object
      required: [start, end]
      properties:
        start:
          type: string
        end:
          type: string

    UpdateSettingsBody:
      type: object
      required: [settings]
      properties:
        settings: {}

    CompleteOnboardingBody:
      type: object
      required: [event_id]
      properties:
        event_id:
          type: string

    # ── Stripe ──
    StripeCustomer:
      type: object
      properties:
        stripe_customer_id:
          type: string
          nullable: true

    LinkStripeCustomerBody:
      type: object
      required: [stripe_customer_id]
      properties:
        stripe_customer_id:
          type: string

    # ── Credentials ──
    Credential:
      type: object
      required: [module, created_at, updated_at]
      properties:
        module:
          type: string
        created_at:
          type: string
        updated_at:
          type: string

    UpsertCredentialBody:
      type: object
      required: [credentials]
      properties:
        credentials: {}

    # ── API Keys ──
    ApiKey:
      type: object
      required: [id, key_prefix, name]
      properties:
        id:
          type: string
        key_prefix:
          type: string
        name:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    GenerateApiKeyBody:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
        name:
          type: string
        expires_in:
          type: integer
          description: Expiration in seconds
        expires_at:
          type: string
          format: date-time
          description: Expiration timestamp (ISO 8601)

    GenerateApiKeyResult:
      type: object
      required: [id, api_key, key_prefix, name]
      properties:
        id:
          type: string
        api_key:
          type: string
        key:
          type: string
        key_prefix:
          type: string
        name:
          type: string
        display_name:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Prompts ──
    Prompt:
      type: object
      required: [id, name, content, enabled, created_at, updated_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        module_name:
          type: string
          nullable: true
        module_id:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        content:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePromptBody:
      type: object
      required: [name, content, enabled]
      properties:
        name:
          type: string
        content:
          type: string
        module_name:
          type: string
        enabled:
          type: boolean
        description:
          type: string

    UpdatePromptBody:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
        module_name:
          type: string
        enabled:
          type: boolean
        description:
          type: string

    # ── OAuth ──
    OAuthAppCredentials:
      type: object
      required: [provider, client_id, client_secret, redirect_uri]
      properties:
        provider:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        redirect_uri:
          type: string

    OAuthConsent:
      type: object
      required: [id, module, created_at]
      properties:
        id:
          type: string
        module:
          type: string
        created_at:
          type: string

    OAuthConsentAdmin:
      type: object
      required: [id, user_id, module, created_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        module:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Admin ──
    OAuthApp:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        redirect_uri:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpsertOAuthAppBody:
      type: object
      required: [client_id, client_secret, redirect_uri]
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        redirect_uri:
          type: string
        enabled:
          type: boolean
