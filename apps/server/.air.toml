# Air - Live reload for Go apps
# https://github.com/cosmtrek/air

root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server.exe ./cmd/server"
bin = "./tmp/server.exe"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor", "test"]
delay = 1000

[misc]
clean_on_exit = true

[env]
# Load environment variables from .env.dev
include_file = "../../.env.dev"

[log]
time = false

[color]
main = "cyan"
watcher = "green"
build = "yellow"
runner = "magenta"
