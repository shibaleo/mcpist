# API Containers for Load Balancer Testing
# Simulates Render (Primary) and Koyeb (Failover) deployment environments
#
# Architecture:
#   - api-render: Primary backend (always running, :8081)
#   - api-koyeb:  Failover backend (on-demand, :8082)
#
# Usage:
#   docker compose -f compose/api.yml up -d
#   docker compose -f compose/api.yml down
#   docker compose -f compose/api.yml logs -f

services:
  # Primary backend (Render simulation)
  api-render:
    build:
      context: ../apps/server
      dockerfile: Dockerfile
    container_name: mcpist-api-render
    ports:
      - "8081:8089"
    environment:
      - PORT=8089
      - INSTANCE_ID=render
      - INSTANCE_REGION=oregon
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-}
      - CONSOLE_URL=http://host.docker.internal:3000
      - VAULT_URL=http://host.docker.internal:3000/api
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-dev-internal-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mcpist-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Failover backend (Koyeb simulation)
  api-koyeb:
    build:
      context: ../apps/server
      dockerfile: Dockerfile
    container_name: mcpist-api-koyeb
    ports:
      - "8082:8089"
    environment:
      - PORT=8089
      - INSTANCE_ID=koyeb
      - INSTANCE_REGION=fra
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-}
      - CONSOLE_URL=http://host.docker.internal:3000
      - VAULT_URL=http://host.docker.internal:3000/api
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-dev-internal-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mcpist-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  mcpist-api:
    driver: bridge
