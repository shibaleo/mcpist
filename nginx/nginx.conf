events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Upstream definitions
    upstream console {
        server console:3000;
    }

    upstream oauth {
        server oauth:4000;
    }

    upstream worker {
        server worker:8787;
    }

    upstream server-primary {
        server server-primary:8089;
    }

    upstream server-secondary {
        server server-secondary:8089;
    }

    # Console: console.localhost
    server {
        listen 80;
        server_name console.localhost;

        location / {
            proxy_pass http://console;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # OAuth Server: oauth.localhost
    server {
        listen 80;
        server_name oauth.localhost;

        location / {
            proxy_pass http://oauth;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # MCP Gateway (Worker): mcp.localhost
    server {
        listen 80;
        server_name mcp.localhost;

        location / {
            proxy_pass http://worker;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # API Server: api.localhost
    server {
        listen 80;
        server_name api.localhost;

        # Primary server: /primary/*
        location /primary/ {
            rewrite ^/primary/(.*)$ /$1 break;
            proxy_pass http://server-primary;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Secondary server: /secondary/*
        location /secondary/ {
            rewrite ^/secondary/(.*)$ /$1 break;
            proxy_pass http://server-secondary;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default: primary server
        location / {
            proxy_pass http://server-primary;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Default server (catch-all)
    server {
        listen 80 default_server;
        server_name _;

        location / {
            return 404 "Not Found: Use console.localhost, oauth.localhost, mcp.localhost, or api.localhost";
        }
    }
}
