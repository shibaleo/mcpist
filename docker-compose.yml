services:
  # =============================================================================
  # Traefik Reverse Proxy
  # =============================================================================
  # default プロファイル用 Traefik
  traefik:
    image: traefik:v3.3
    container_name: mcpist-traefik
    profiles: ["default"]
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik/default:/etc/traefik/dynamic:ro
    networks:
      - mcpist

  # infra プロファイル用 Traefik
  traefik-infra:
    image: traefik:v3.3
    container_name: mcpist-traefik-infra
    profiles: ["infra"]
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik/infra:/etc/traefik/dynamic:ro
    networks:
      - mcpist

  console:
    build:
      context: ./apps/console
      dockerfile: Dockerfile.dev
    container_name: mcpist-console
    profiles: ["default", "infra"]
    environment:
      - PORT=3000
      - NEXT_PUBLIC_APP_URL=http://console.localhost
      - NEXT_PUBLIC_MCP_SERVER_URL=http://mcp.localhost
      - NEXT_PUBLIC_SUPABASE_URL=http://host.docker.internal:54321
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - MCP_SERVER_URL=http://mcp.localhost
      - CONSOLE_URL=http://console.localhost
    volumes:
      - ./apps/console:/app
      - /app/node_modules
      - /app/.next
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # Worker (Cloudflare Workers エミュレーション)
  # =============================================================================
  # 通常開発: server を参照
  # infra 開発: server-primary, server-secondary を参照
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile.dev
    container_name: mcpist-worker
    profiles: ["default"]
    environment:
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - PRIMARY_API_URL=http://server:8089
      - SECONDARY_API_URL=http://server:8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_JWKS_URL=http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # infra 開発用 Worker（マルチサーバー構成）
  worker-infra:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile.dev
    container_name: mcpist-worker-infra
    profiles: ["infra"]
    environment:
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - PRIMARY_API_URL=http://server-primary:8089
      - SECONDARY_API_URL=http://server-secondary:8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_JWKS_URL=http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # API Server (通常開発用 - シングルサーバー)
  # =============================================================================
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.dev
    container_name: mcpist-server
    profiles: ["default"]
    environment:
      - PORT=8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CONSOLE_URL=http://console.localhost
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - VAULT_URL=http://console:3000/api
      - INSTANCE_ID=local-docker
      - INSTANCE_REGION=local
    volumes:
      - ./apps/server:/app
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # API Server (infra 開発用 - マルチサーバー)
  # =============================================================================
  # Primary (Render 相当)
  # api.localhost/primary/* → server-primary
  server-primary:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.dev
    container_name: mcpist-server-primary
    profiles: ["infra"]
    environment:
      - PORT=8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CONSOLE_URL=http://console.localhost
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - VAULT_URL=http://console:3000/api
      - INSTANCE_ID=local-primary
      - INSTANCE_REGION=render
    volumes:
      - ./apps/server:/app
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Secondary (Koyeb 相当)
  # api.localhost/secondary/* → server-secondary
  server-secondary:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.dev
    container_name: mcpist-server-secondary
    profiles: ["infra"]
    environment:
      - PORT=8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CONSOLE_URL=http://console.localhost
      - GATEWAY_SECRET=${GATEWAY_SECRET}
      - VAULT_URL=http://console:3000/api
      - INSTANCE_ID=local-secondary
      - INSTANCE_REGION=koyeb
    volumes:
      - ./apps/server:/app
    networks:
      - mcpist
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  mcpist:
    driver: bridge
