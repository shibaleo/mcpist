# MCPist Local Development Environment
#
# Usage:
#   1. Start Supabase first: cd supabase && supabase start
#   2. Start services: docker compose up -d
#
# Ports:
#   - Console (Next.js): 3000
#   - Go Server (MCP):   8089
#   - Supabase API:      54321 (via supabase start)
#   - Supabase DB:       54322 (via supabase start)
#   - Supabase Studio:   54323 (via supabase start)

services:
  console:
    build:
      context: .
      dockerfile: apps/console/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # NEXT_PUBLIC_* はブラウザから直接アクセスするためlocalhost
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      # サーバーサイドはhost.docker.internal
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_MCP_SERVER_URL=http://localhost:8089
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-dev-internal-key}
    volumes:
      - ./apps/console/src:/app/apps/console/src:ro
      - ./apps/console/public:/app/apps/console/public:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mcpist-network
    depends_on:
      - server

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    ports:
      - "8089:8089"
    environment:
      - PORT=8089
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CONSOLE_URL=http://host.docker.internal:3000
      - VAULT_URL=http://host.docker.internal:3000/api
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-dev-internal-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mcpist-network

networks:
  mcpist-network:
    driver: bridge
